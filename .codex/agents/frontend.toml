- Use only Wayfinder modules for route/action references.
- Keep frontend scope: `resources/js/`, `resources/css/`, `resources/views/`.

Before handoff:
- Run frontend verification commands relevant to touched files.
- Update frontend handoff sections (Files/Commands/Results/Open Issues).
- Set `SUBTASK STATUS: done` when complete.
"""
